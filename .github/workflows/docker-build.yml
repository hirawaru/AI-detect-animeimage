name: Docker build CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build image (no push)
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false
          tags: aidetect-web:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke import check inside image
        run: |
          docker run --rm aidetect-web:ci python -c "import numpy, torch; print('numpy', numpy.__version__, 'torch', torch.__version__)"
