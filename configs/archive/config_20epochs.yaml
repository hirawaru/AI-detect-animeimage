# Retrain for ~20 epochs (resume from best checkpoint)
data:
  raw_path: "E:/archive/V5Minor100"
  train_path: "data/train"
  val_path: "data/val"
  test_path: "data/test"
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15

model:
  name: "efficientnet_b3"
  pretrained: true
  num_classes: 2
  dropout: 0.3

training:
  batch_size: 16
  num_epochs: 20
  learning_rate: 0.001
  optimizer: "adam"
  scheduler: "cosine"
  weight_decay: 1e-4
  patience: 10

augmentation:
  enabled: true
  random_horizontal_flip: 0.5
  random_vertical_flip: 0.2
  random_rotation: 15
  color_jitter: 0.2
  random_affine: true

preprocessing:
  image_size: 384
  normalize_mean: [0.485, 0.456, 0.406]
  normalize_std: [0.229, 0.224, 0.225]

output:
  model_save_path: "models"
  results_path: "results"
  checkpoint_path: "models/checkpoints"

device: "cpu"
num_workers: 0
